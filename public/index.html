<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emlak Fırsat Ekranı</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap");

      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --line: #d9e1ee;
        --text: #0f1f36;
        --muted: #5f7290;
        --blue: #1f78ff;
        --blue-dark: #1165e8;
        --ok-bg: #ecfff4;
        --ok-line: #bdeed0;
        --ok-text: #17643d;
        --bad-bg: #fff1f4;
        --bad-line: #ffd0d9;
        --bad-text: #a2143a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Nunito", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 1rem;
        display: grid;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
      }

      p {
        margin: 0.4rem 0 0;
      }

      .muted {
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
      }

      .grid {
        display: grid;
        gap: 0.8rem;
      }

      @media (min-width: 760px) {
        .grid.two {
          grid-template-columns: 1fr 1fr;
        }
      }

      label {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 1.05rem;
        font-weight: 800;
      }

      select,
      button {
        width: 100%;
        border-radius: 12px;
        padding: 0.78rem 0.8rem;
        font-size: 1.05rem;
        border: 1px solid var(--line);
      }

      button {
        border: none;
        background: var(--blue);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--blue-dark);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 800;
        white-space: pre-wrap;
      }

      .hint.ok {
        background: var(--ok-bg);
        border: 1px solid var(--ok-line);
        color: var(--ok-text);
      }

      .hint.bad {
        background: var(--bad-bg);
        border: 1px solid var(--bad-line);
        color: var(--bad-text);
      }

      .stats {
        display: grid;
        gap: 0.7rem;
      }

      @media (min-width: 760px) {
        .stats {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .stat {
        background: #f8fbff;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.7rem;
      }

      .stat .k {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .stat .v {
        margin-top: 0.2rem;
        font-size: 1.45rem;
        font-weight: 800;
      }

      .deal-list {
        display: grid;
        gap: 0.7rem;
      }

      .deal {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.75rem;
        display: grid;
        gap: 0.35rem;
        background: #fff;
      }

      .deal strong {
        font-size: 1.05rem;
      }

      .deal .line {
        color: #274164;
        font-size: 0.95rem;
      }

      .deal a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 800;
      }

      .deal a:hover {
        text-decoration: underline;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fcfdff;
      }

      .tiny {
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Emlakta Uygun Fiyat Bul</h1>
        <p class="muted">Bölgeyi seçin, tek tuşla tarayın. Sonuçlar ekrana otomatik gelir.</p>
      </section>

      <section class="card grid">
        <div class="grid two">
          <div>
            <label for="city">İl seç</label>
            <select id="city"></select>
          </div>
          <div>
            <label for="district">İlçe seç</label>
            <select id="district"></select>
          </div>
        </div>

        <button id="startBtn">TARAMAYI BAŞLAT</button>
        <div id="status" class="hint ok">Hazır. Bölgeyi seçip butona basın.</div>
        <p class="muted tiny">Not: Tarama genelde 2-4 dakika sürer. Beklerken sayfayı kapatmayın.</p>
      </section>

      <section class="card">
        <div class="stats">
          <div class="stat">
            <div class="k">Son tarama zamanı</div>
            <div id="lastRun" class="v">-</div>
          </div>
          <div class="stat">
            <div class="k">Aktif ilan sayısı</div>
            <div id="activeCount" class="v">-</div>
          </div>
          <div class="stat">
            <div class="k">Uygun fiyat adayı</div>
            <div id="dealCount" class="v">-</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 style="margin: 0 0 0.5rem">En Uygun 10 İlan</h2>
        <div id="dealList" class="deal-list"></div>
      </section>
    </main>

    <script>
      const cityEl = document.getElementById("city");
      const districtEl = document.getElementById("district");
      const startBtn = document.getElementById("startBtn");
      const statusEl = document.getElementById("status");
      const lastRunEl = document.getElementById("lastRun");
      const activeCountEl = document.getElementById("activeCount");
      const dealCountEl = document.getElementById("dealCount");
      const dealListEl = document.getElementById("dealList");

      let locationData = [];
      let autoTimer = null;

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "hint bad" : "hint ok";
      }

      function normalizeForMatch(text) {
        return String(text || "")
          .trim()
          .toLocaleLowerCase("tr-TR")
          .replace(/ç/g, "c")
          .replace(/ğ/g, "g")
          .replace(/ı/g, "i")
          .replace(/ö/g, "o")
          .replace(/ş/g, "s")
          .replace(/ü/g, "u");
      }

      function pickByNormalized(values, target) {
        const wanted = normalizeForMatch(target);
        return values.find((x) => normalizeForMatch(x) === wanted) || null;
      }

      function fmtInt(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) {
          return "-";
        }
        return new Intl.NumberFormat("tr-TR").format(n);
      }

      function fmtMoney(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) {
          return "-";
        }
        return new Intl.NumberFormat("tr-TR", {
          style: "currency",
          currency: "TRY",
          maximumFractionDigits: 0
        }).format(n);
      }

      function fmtDiscount(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) {
          return "-";
        }
        return `%${(n * 100).toFixed(1)} daha düşük`;
      }

      function fmtDate(value) {
        if (!value) {
          return "-";
        }
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
          return value;
        }
        return d.toLocaleString("tr-TR", { hour12: false });
      }

      function fillDistricts(cityName) {
        const row = locationData.find((x) => x.city === cityName);
        const districts = row ? row.districts : [];

        districtEl.innerHTML = "";
        for (const district of districts) {
          const opt = document.createElement("option");
          opt.value = district;
          opt.textContent = district;
          districtEl.appendChild(opt);
        }
      }

      async function loadLocations() {
        const res = await fetch("/tr-locations.json");
        const body = await res.json();
        locationData = body.items || [];

        cityEl.innerHTML = "";
        for (const item of locationData) {
          const opt = document.createElement("option");
          opt.value = item.city;
          opt.textContent = item.city;
          cityEl.appendChild(opt);
        }

        const defaultCity = pickByNormalized(
          locationData.map((x) => x.city),
          "Istanbul"
        ) || locationData[0]?.city;

        cityEl.value = defaultCity || "";
        fillDistricts(cityEl.value);

        const defaultDistrict = pickByNormalized(
          [...districtEl.options].map((x) => x.value),
          "Atasehir"
        );
        if (defaultDistrict) {
          districtEl.value = defaultDistrict;
        }
      }

      async function fetchRunInfo() {
        const city = cityEl.value || "Istanbul";
        const district = districtEl.value || "Atasehir";
        const params = new URLSearchParams({ city, district, limit: "1" });
        const res = await fetch(`/api/runs?${params.toString()}`);
        const body = await res.json();
        if (!res.ok) {
          throw new Error(body.error || `HTTP ${res.status}`);
        }

        const run = (body.runs || [])[0];
        lastRunEl.textContent = run ? fmtDate(run.startedAt) : "-";
      }

      async function fetchDeals() {
        const city = cityEl.value || "Istanbul";
        const district = districtEl.value || "Atasehir";

        const params = new URLSearchParams({
          city,
          district,
          limit: "10",
          min_discount: "0.12",
          min_confidence: "0.35",
          min_comps: "6"
        });

        const res = await fetch(`/api/deals?${params.toString()}`);
        const body = await res.json();
        if (!res.ok) {
          throw new Error(body.error || `HTTP ${res.status}`);
        }

        const totals = body.totals || {};
        activeCountEl.textContent = fmtInt(totals.activeListings);
        dealCountEl.textContent = fmtInt(totals.dealsMatched);

        const deals = body.deals || [];
        dealListEl.innerHTML = "";

        if (deals.length === 0) {
          dealListEl.innerHTML = '<div class="empty">Bu bölgede şu an uygun fiyat adayı görünmüyor. Tekrar tarama başlatabilirsiniz.</div>';
          return;
        }

        for (const d of deals) {
          const title = (d.title || "ilan").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          const safeUrl = String(d.url || "").replace(/"/g, "&quot;");

          const item = document.createElement("div");
          item.className = "deal";
          item.innerHTML = `
            <strong>${fmtDiscount(d.discountPct)}</strong>
            <div class="line">İlan fiyatı: ${fmtMoney(d.priceTl)}</div>
            <div class="line">Tahmini normal fiyat: ${fmtMoney(d.fairPriceEstimate)}</div>
            <div class="line">${title}</div>
            <div><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">İlanı aç</a></div>
          `;
          dealListEl.appendChild(item);
        }
      }

      async function refreshSnapshot() {
        await Promise.all([fetchRunInfo(), fetchDeals()]);
      }

      function startAutoRefresh() {
        if (autoTimer) {
          clearInterval(autoTimer);
        }
        autoTimer = setInterval(() => {
          refreshSnapshot().catch(() => {
            // Keep silent during background refreshes.
          });
        }, 20000);
      }

      async function startScan() {
        const city = cityEl.value;
        const district = districtEl.value;

        startBtn.disabled = true;
        try {
          setStatus(`Tarama başlatılıyor...\nBölge: ${city} / ${district}`);

          const res = await fetch("/api/crawl-request", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ city, district, sources: "all" })
          });

          const body = await res.json();
          if (!res.ok) {
            throw new Error(body.error || `HTTP ${res.status}`);
          }

          setStatus("Tarama başladı.\nLütfen 2-4 dakika bekleyin.\nSonuçlar bu sayfaya otomatik düşecek.");
          await refreshSnapshot();
        } catch (error) {
          setStatus(`Başlatılamadı: ${String(error.message || error)}`, true);
        } finally {
          startBtn.disabled = false;
        }
      }

      cityEl.addEventListener("change", () => {
        fillDistricts(cityEl.value);
        refreshSnapshot().catch((error) => setStatus(`Veri alınamadı: ${String(error.message || error)}`, true));
      });

      districtEl.addEventListener("change", () => {
        refreshSnapshot().catch((error) => setStatus(`Veri alınamadı: ${String(error.message || error)}`, true));
      });

      startBtn.addEventListener("click", () => {
        startScan().catch((error) => setStatus(`Tarama hatası: ${String(error.message || error)}`, true));
      });

      (async function bootstrap() {
        try {
          await loadLocations();
          await refreshSnapshot();
          startAutoRefresh();
          setStatus("Hazır. Sadece bölgeyi seçip 'TARAMAYI BAŞLAT' butonuna basın.");
        } catch (error) {
          setStatus(`Açılış hatası: ${String(error.message || error)}`, true);
        }
      })();
    </script>
  </body>
</html>
