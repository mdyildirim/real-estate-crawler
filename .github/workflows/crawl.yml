name: Crawl Real Estate

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (TR or ES)"
        required: false
        default: "TR"
      city:
        description: "City in selected country"
        required: false
        default: "Istanbul"
      district:
        description: "District in selected city"
        required: false
        default: "Atasehir"
      city_slug:
        description: "Optional city slug override for source URL"
        required: false
        default: ""
      district_slug:
        description: "Optional district slug override for source URL"
        required: false
        default: ""
      sources:
        description: "Comma-separated source keys or all"
        required: false
        default: "all"
  schedule:
    - cron: "30 */6 * * *"

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve inputs
        id: params
        shell: bash
        run: |
          COUNTRY="${{ github.event.inputs.country }}"
          CITY="${{ github.event.inputs.city }}"
          DISTRICT="${{ github.event.inputs.district }}"
          CITY_SLUG="${{ github.event.inputs.city_slug }}"
          DISTRICT_SLUG="${{ github.event.inputs.district_slug }}"
          SOURCES="${{ github.event.inputs.sources }}"

          if [ -z "$COUNTRY" ]; then COUNTRY="TR"; fi
          if [ -z "$CITY" ]; then
            if [ "$COUNTRY" = "ES" ]; then CITY="Madrid"; else CITY="Istanbul"; fi
          fi
          if [ -z "$DISTRICT" ]; then
            if [ "$COUNTRY" = "ES" ]; then DISTRICT="Madrid Capital"; else DISTRICT="Atasehir"; fi
          fi
          if [ -z "$SOURCES" ]; then SOURCES="all"; fi

          echo "country=$COUNTRY" >> "$GITHUB_OUTPUT"
          echo "city=$CITY" >> "$GITHUB_OUTPUT"
          echo "district=$DISTRICT" >> "$GITHUB_OUTPUT"
          echo "city_slug=$CITY_SLUG" >> "$GITHUB_OUTPUT"
          echo "district_slug=$DISTRICT_SLUG" >> "$GITHUB_OUTPUT"
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"

      - name: Run crawler
        run: |
          node src/crawl.js \
            --country="${{ steps.params.outputs.country }}" \
            --city="${{ steps.params.outputs.city }}" \
            --district="${{ steps.params.outputs.district }}" \
            --city-slug="${{ steps.params.outputs.city_slug }}" \
            --district-slug="${{ steps.params.outputs.district_slug }}" \
            --sources="${{ steps.params.outputs.sources }}" \
            --sqlite-path=data/real-estate-ci.sqlite

      - name: Push crawl payload to Cloudflare ingest endpoint
        env:
          CF_INGEST_URL: ${{ secrets.CF_INGEST_URL }}
          CF_INGEST_TOKEN: ${{ secrets.CF_INGEST_TOKEN }}
          FALLBACK_INGEST_URL: "https://real-estate-crawler.pages.dev/api/ingest"
        run: |
          TARGET_INGEST_URL="$CF_INGEST_URL"
          if [ -z "$TARGET_INGEST_URL" ]; then
            TARGET_INGEST_URL="$FALLBACK_INGEST_URL"
            echo "CF_INGEST_URL is not configured. Falling back to $TARGET_INGEST_URL"
          fi
          CF_INGEST_URL="$TARGET_INGEST_URL" CF_INGEST_TOKEN="$CF_INGEST_TOKEN" npm run push:cf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawl-output-${{ github.run_id }}
          path: |
            output/latest-results.json
            output/latest-summary.json
            output/latest-listings.csv
            data/real-estate-ci.sqlite
          if-no-files-found: warn
